<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinSanté | Communiqués</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABLES GLOBALES (UNIFIÉES) --- */
        :root { --primary: #0284c7; --secondary: #0ea5e9; --dark: #0f172a; --light: #f8fafc; --white: #ffffff; --gray: #64748b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--dark); line-height: 1.6; }

        /* --- NAVIGATION --- */
        header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { font-weight: 800; font-size: 1.6rem; color: var(--primary); }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .hamburger { display: none; font-size: 24px; cursor: pointer; color: var(--primary); }

        /* --- STYLE COMMUNIQUÉ --- */
        .page-title { text-align: center; margin: 50px 0 40px; font-size: 2.5rem; }
        .news-container { max-width: 800px; margin: 0 auto 50px; padding: 0 20px; }
        
        .news-card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.03); margin-bottom: 30px; border: 1px solid rgba(0,0,0,0.03); }
        .news-date { color: var(--primary); font-weight: 700; font-size: 0.85rem; display: block; margin-bottom: 10px; }
        .news-card h2 { margin-bottom: 15px; font-size: 1.5rem; }
        .news-card img { width: 100%; height: 300px; object-fit: cover; border-radius: 16px; margin-bottom: 20px; }
        .news-card p { color: var(--gray); }

        @media (max-width: 768px) {
            .nav-links { display: none; flex-direction: column; position: absolute; top: 80px; left: 0; width: 100%; background: white; padding: 40px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
            .nav-links.active { display: flex; gap: 25px; }
            .hamburger { display: block; }
            .page-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">KinSanté</div>
        <div class="hamburger" onclick="document.getElementById('nav').classList.toggle('active')"><i class="fas fa-bars"></i></div>
        <nav>
            <ul class="nav-links" id="nav">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="sante.html">Santé</a></li>
                <li><a href="medicaments.html">Médicaments</a></li>
                <li><a href="recommandations.html">Recommandés</a></li>
                <li><a href="communique.html">Communiqués</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Nos Communiqués</h1>

        <div class="news-container" id="news-feed">
            
            <div class="news-card">
                <span class="news-date">26 Mai 2026</span>
                <h2>Nouvelle campagne de santé publique</h2>
                <img src="https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?w=800" alt="News">
                <p>La ville lance aujourd'hui une grande opération de prévention. Soyez attentifs aux prochaines annonces.</p>
            </div>

        </div>
    </main>

</body>
</html>
